name: CI

# PR-only to conserve shared GitHub Actions minutes (project policy): the byte-parity
# gate runs on every pull request, not on push or a schedule.
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: hash, openssl
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Unit tests (offline byte-parity gate)
        run: vendor/bin/pest --testsuite Unit
